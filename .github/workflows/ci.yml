name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/dependency-review-action@v4

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/StudyQuest.API

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Check vulnerable NuGet packages
        run: dotnet list package --vulnerable --include-transitive

      - name: Discover test projects
        id: backend-tests
        shell: bash
        run: |
          count=$(find . -name "*Tests.csproj" | wc -l)
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Test
        if: steps.backend-tests.outputs.count != '0'
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Warn when no backend tests
        if: steps.backend-tests.outputs.count == '0'
        run: echo "No backend test projects found. Add tests to enforce quality gates."

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
